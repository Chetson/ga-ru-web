services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ga-ru-web
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:3000').then(r => {if(!r.ok) throw new Error(r.status);})",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
